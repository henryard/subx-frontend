    <style>
        /* ══ 设计令牌 ══ */
        :root {
            --bg:              #eef0f8;
            --bg-card:         rgba(255,255,255,0.78);
            --bg-glass:        rgba(255,255,255,0.55);
            --bg-input:        rgba(255,255,255,0.65);
            --bg-input-hov:    rgba(255,255,255,0.92);
            --border:          rgba(90,80,180,0.10);
            --border-subtle:   rgba(0,0,0,0.055);
            --border-focus:    rgba(99,102,241,0.50);
            --text-primary:    #16161e;
            --text-secondary:  #555570;
            --text-muted:      #9898b0;
            --text-placeholder:#b0b0c8;

            --accent:          #5b5ef4;
            --accent-2:        #8b5cf6;
            --accent-3:        #06b6d4;
            --accent-light:    rgba(91,94,244,0.10);
            --accent-glow:     rgba(91,94,244,0.28);

            --orb-a:           rgba(91,94,244,0.14);
            --orb-b:           rgba(139,92,246,0.10);
            --orb-c:           rgba(6,182,212,0.08);

            --btn-shadow:      0 8px 28px -6px rgba(91,94,244,0.42);
            --btn-shadow-hov:  0 14px 36px -8px rgba(91,94,244,0.58);
            --card-shadow:     0 32px 72px -20px rgba(60,50,140,0.12), 0 2px 8px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.7);
            --input-shadow-f:  0 0 0 3.5px rgba(91,94,244,0.13);
            --result-bg:       rgba(91,94,244,0.04);
            --result-bg-hov:   rgba(91,94,244,0.08);

            --toast-success:   rgba(16,185,129,0.93);
            --toast-error:     rgba(239,68,68,0.93);
            --toast-warn:      rgba(245,158,11,0.93);

            --radius-card:     26px;
            --radius-input:    13px;
            --radius-btn:      13px;
            --transition:      0.22s cubic-bezier(0.4,0,0.2,1);
        }

        html.dark {
            --bg:              #0c0d15;
            --bg-card:         rgba(18,19,32,0.94);
            --bg-glass:        rgba(255,255,255,0.03);
            --bg-input:        rgba(255,255,255,0.045);
            --bg-input-hov:    rgba(255,255,255,0.08);
            --border:          rgba(140,130,255,0.10);
            --border-subtle:   rgba(255,255,255,0.06);
            --border-focus:    rgba(130,133,252,0.50);
            --text-primary:    #eeeef5;
            --text-secondary:  #9898b8;
            --text-muted:      #555570;
            --text-placeholder:#3a3a52;
            --orb-a:           rgba(91,94,244,0.18);
            --orb-b:           rgba(139,92,246,0.14);
            --orb-c:           rgba(6,182,212,0.07);
            --accent-light:    rgba(91,94,244,0.14);
            --accent-glow:     rgba(91,94,244,0.22);
            --btn-shadow:      0 8px 28px -6px rgba(91,94,244,0.35);
            --btn-shadow-hov:  0 14px 36px -8px rgba(91,94,244,0.48);
            --card-shadow:     0 32px 72px -20px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            --input-shadow-f:  0 0 0 3.5px rgba(91,94,244,0.16);
            --result-bg:       rgba(91,94,244,0.06);
            --result-bg-hov:   rgba(91,94,244,0.12);
        }

        /* ══ Reset & base ══ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background-color: var(--bg);
            min-height: 100%;
            transition: background-color 0.4s;
        }
        body {
            font-family: 'Sora', -apple-system, sans-serif;
            font-size: 14.5px;
            color: var(--text-primary);
            background: transparent;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
            position: relative;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.4s;
        }

        /* ══ Noise texture overlay ══ */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 128px 128px;
            opacity: 0.6;
            pointer-events: none;
        }

        /* ══ Dot grid ══ */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(circle, var(--border-subtle) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        /* ══ Ambient orbs ══ */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(90px);
        }
        .orb-a {
            width: min(60vw, 420px); height: min(60vw, 420px);
            top: -14%; right: -8%;
            background: radial-gradient(circle, var(--orb-a), transparent 68%);
            animation: driftA 18s ease-in-out infinite;
        }
        .orb-b {
            width: min(70vw, 480px); height: min(70vw, 480px);
            bottom: -18%; left: -14%;
            background: radial-gradient(circle, var(--orb-b), transparent 68%);
            animation: driftB 22s ease-in-out infinite;
        }
        .orb-c {
            width: min(40vw, 280px); height: min(40vw, 280px);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: radial-gradient(circle, var(--orb-c), transparent 68%);
            animation: driftC 14s ease-in-out infinite;
        }
        @keyframes driftA {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(-20px,30px) scale(1.06); }
            66%      { transform: translate(15px,-20px) scale(0.96); }
        }
        @keyframes driftB {
            0%,100% { transform: translate(0,0) scale(1); }
            40%      { transform: translate(30px,-25px) scale(1.08); }
            70%      { transform: translate(-10px,20px) scale(0.94); }
        }
        @keyframes driftC {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
            50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
        }

        /* ══ Card ══ */
        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 468px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 38px 34px 34px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(32px) saturate(1.8);
            -webkit-backdrop-filter: blur(32px) saturate(1.8);
            animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
        }
        @media (max-width: 480px) {
            .card { padding: 30px 22px 26px; border-radius: 20px; }
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(22px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* Card inner top highlight line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
            border-radius: 1px;
        }
        html.dark .card::before {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
        }

        /* ══ Header ══ */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 34px;
        }
        .logo-wrap {
            position: relative;
        }
        .logo-icon {
            width: 54px; height: 54px;
            background: linear-gradient(145deg, var(--accent) 0%, var(--accent-2) 100%);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px -6px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            z-index: 1;
        }
        .logo-icon svg { width: 26px; height: 26px; stroke: #fff; }
        .logo-glow {
            position: absolute;
            inset: -8px;
            border-radius: 22px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            animation: logoGlow 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes logoGlow {
            0%,100% { opacity: 0.5; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.1); }
        }

        .header-text { text-align: center; }
        .title {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.4px;
            background: linear-gradient(130deg, var(--accent) 0%, var(--accent-2) 55%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.15px;
        }

        /* ══ Divider ══ */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle) 30%, var(--border-subtle) 70%, transparent);
            margin: 0 -4px 26px;
        }

        /* ══ Field group ══ */
        .field { margin-bottom: 18px; }
        .label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 9px;
            user-select: none;
        }
        .label-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        /* ══ Input ══ */
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition);
        }
        .input-icon svg { width: 15px; height: 15px; stroke: currentColor; }

        input[type="url"] {
            width: 100%;
            height: 48px;
            padding: 0 14px 0 40px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13.5px;
            outline: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
            -webkit-appearance: none;
        }
        input[type="url"]::placeholder { color: var(--text-placeholder); }
        input[type="url"]:focus {
            border-color: var(--border-focus);
            background: var(--bg-input-hov);
            box-shadow: var(--input-shadow-f);
        }
        input[type="url"]:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--accent);
        }
        input[type="url"].has-value { background: var(--bg-input-hov); }

        /* Paste hint */
        .paste-hint {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 3px 7px;
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 0.2px;
        }
        .paste-hint:hover {
            color: var(--accent);
            border-color: var(--border-focus);
            background: var(--accent-light);
        }
        .paste-hint.hidden { display: none; }

        /* ══ URL info badge ══ */
        .url-info {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 9px;
            padding: 9px 13px;
            background: rgba(245,158,11,0.07);
            border: 1px solid rgba(245,158,11,0.18);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 400;
            color: #c57d00;
            animation: slideDown 0.22s ease;
        }
        html.dark .url-info { color: #f5c045; background: rgba(245,158,11,0.08); }
        .url-info.show { display: flex; }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-5px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ══ Client select ══ */
        .select-wrap { position: relative; }

        .select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 48px;
            padding: 0 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-input);
            cursor: pointer;
            font-family: inherit;
            font-size: 13.5px;
            color: var(--text-primary);
            user-select: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
            -webkit-user-select: none;
        }
        .select-trigger:focus { outline: none; }
        .select-trigger.open {
            border-color: var(--border-focus);
            background: var(--bg-input-hov);
            box-shadow: var(--input-shadow-f);
        }
        .select-trigger.disabled { opacity: 0.42; cursor: not-allowed; pointer-events: none; }

        .select-left {
            display: flex; align-items: center; gap: 10px;
        }
        
        /* 替换掉以前基于文字的Badge，使用图像作为选中项的图标 */
        .client-icon {
            width: 24px; height: 24px;
            border-radius: 5px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform var(--transition);
        }
        html.dark .client-icon {
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .select-trigger.open .client-icon { 
            transform: scale(0.95);
        }

        .chevron-wrap {
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            background: var(--border-subtle);
            flex-shrink: 0;
            transition: background var(--transition), transform var(--transition);
        }
        .select-trigger.open .chevron-wrap { background: var(--accent-light); transform: rotate(180deg); }
        .chevron-wrap svg { width: 12px; height: 12px; stroke: var(--text-secondary); }

        .dropdown {
            position: absolute;
            top: calc(100% + 7px);
            left: 0; right: 0;
            z-index: 50;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 5px;
            box-shadow: 0 20px 48px -10px rgba(0,0,0,0.20), 0 2px 8px rgba(0,0,0,0.06);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.97);
            transform-origin: top center;
            transition: opacity 0.18s, transform 0.22s cubic-bezier(0.34,1.3,0.64,1), visibility 0.18s;
        }
        .dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
        }
        .option:hover { background: var(--accent-light); color: var(--accent); }
        .option.selected { color: var(--accent); font-weight: 600; background: var(--accent-light); }
        
        /* 修改图标容器以适应真实图片图标（无边框，增加细节阴影） */
        .option-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: transparent;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        html.dark .option-icon {
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .option-icon img {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            object-fit: cover;
            display: block;
        }

        /* ══ Convert button ══ */
        .btn-convert {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 50px;
            margin-top: 10px;
            background: linear-gradient(130deg, var(--accent) 0%, var(--accent-2) 100%);

            border-radius: var(--radius-btn);

            font-weight: 600;

            align-items: center;
            justify-content: center;
            gap: 8px;

        .btn-convert:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: var(--btn-shadow-hov);

        .btn-convert:not(:disabled):active {

            box-shadow: 0 4px 14px -4px var(--accent-glow);

        .btn-convert:disabled { opacity: 0.46; cursor: not-allowed; }

        /* Shimmer sweep */
        .btn-convert::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.26) 50%, transparent 70%);
            transform: translateX(-120%);
            transition: transform 0s;
        }
        .btn-convert:not(:disabled):hover::before {
            transform: translateX(120%);
            transition: transform 0.65s ease;
        }
        /* Top edge highlight */
        .btn-convert::after {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: rgba(255,255,255,0.35);
            border-radius: 1px;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.28);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══ Progress track ══ */
        .progress-track {
            height: 2px;
            background: var(--border-subtle);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            opacity: 0;

        .progress-bar {
            height: 100%;
            width: 0%;

            border-radius: 2px;
            transition: width 2.8s cubic-bezier(0.4,0,0.2,1);
        }

        /* ══ Result box ══ */
        .result-wrap {
            margin-top: 20px;
            display: none;
            animation: resultIn 0.3s cubic-bezier(0.34,1.2,0.64,1) both;
        }
        @keyframes resultIn {
            from { opacity:0; transform:translateY(8px) scale(0.98); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .result-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 9px;
        }

        .result-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: #10b981;
            opacity: 0;
            animation: fadeIn 0.3s 0.15s ease both;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50%      { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
        }

        .result-box {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 48px 13px 14px;
            background: var(--result-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-input);
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
        }
        .result-box:hover {
            border-color: var(--border-focus);
            background: var(--result-bg-hov);
            box-shadow: var(--input-shadow-f);
        }
        .result-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            line-height: 1.65;
            color: var(--text-secondary);
            word-break: break-all;
            flex: 1;
        }

        /* QR / copy row */
        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 9px;
        }
        .action-btn {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            height: 36px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;

            transition: all var(--transition);

        .action-btn:hover {

        /* Inline copy button */

            position: absolute;

        /* ══ QR Modal ══ */
        .modal-overlay {

        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal {

        .modal-close:hover { background: var(--accent); color: #fff; }

        /* ══ Theme toggle ══ */
        .theme-btn {
            position: fixed;
            top: max(18px, env(safe-area-inset-top, 18px));
            right: 18px;
            z-index: 100;

        }
        .theme-btn:hover { transform: scale(1.1) rotate(12deg); box-shadow: 0 4px 18px rgba(0,0,0,0.14); }
        .theme-btn:active { transform: scale(0.92); }
        .theme-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sun  { display: block; }
        .icon-moon { display: none; }
        html.dark .icon-sun  { display: none; }
        html.dark .icon-moon { display: block; }

        /* ══ Toasts ══ */
        #toast-container {
            position: fixed;
            bottom: max(22px, env(safe-area-inset-bottom, 22px));
            left: 50%;
            transform: translateX(-50%);

            align-items: center;

            max-width: calc(100vw - 36px);

        }
        .toast {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 17px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #fff;

        .toast.out { animation: toastOut 0.28s ease forwards; }
        .toast-icon { flex-shrink: 0; line-height: 1; font-size: 14px; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(14px) scale(0.88); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-10px) scale(0.9); } }

</head>

<script>
    /* ─── iOS Safari theme-color ──── */
    const THEME_COLORS = { light: '#eef0f8', dark: '#0c0d15' };
    const themeMeta = document.getElementById('theme-meta');
    function applyThemeColor(isDark) {
        const color = isDark ? THEME_COLORS.dark : THEME_COLORS.light;
        themeMeta.setAttribute('content', '#000000');
        requestAnimationFrame(() => themeMeta.setAttribute('content', color));
    }
    function setTheme(isDark, save = true) {
        document.documentElement.classList.toggle('dark', isDark);
        if (save) localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyThemeColor(isDark);
    }
    (function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(saved === 'dark' || (!saved && prefersDark), false);
    })();
    document.getElementById('theme-toggle').addEventListener('click', () => {
        setTheme(!document.documentElement.classList.contains('dark'));
    });

    /* ─── Helpers ──── */
    const SHORT_DOMAINS = [
        'suo.yt','t.cn','bit.ly','tinyurl.com','short.link','dwz.cn',
        'u.nu','gg.gg','is.gd','v.gd','cutt.ly','rebrand.ly','t.co',
        'goo.gl','v1.mk','d1.mk','dlj.tf','sub.cm'
    ];
    function isValidUrl(s) {
        if (!s || !s.trim().toLowerCase().startsWith('http')) return false;
        try { new URL(s); return true; } catch { return false; }
    }
    function isShortLink(url) {
        try {
            const h = new URL(url).hostname.toLowerCase();
            return SHORT_DOMAINS.some(d => h === d || h.endsWith('.' + d));
        } catch { return false; }
    }

    /* ─── Toast ──── */
    const TOAST_CONFIG = {
        success: { bg: 'rgba(16,185,129,0.93)',  icon: '✓' },
        error:   { bg: 'rgba(239,68,68,0.93)',   icon: '✕' },
        warning: { bg: 'rgba(245,158,11,0.93)',  icon: '⚠' },
    };
    const toastContainer = document.getElementById('toast-container');
    function showToast(msg, type = 'success') {
        if (type === 'warning') {
            toastContainer.querySelectorAll('.toast[data-type="warning"]').forEach(t => t.remove());
        }
        const cfg = TOAST_CONFIG[type] || TOAST_CONFIG.success;
        const el = document.createElement('div');
        el.className = 'toast';
        el.dataset.type = type;
        el.style.background = cfg.bg;
        el.innerHTML = `<span class="toast-icon">${cfg.icon}</span><span>${msg}</span>`;
        toastContainer.appendChild(el);
        setTimeout(() => {
            el.classList.add('out');
            setTimeout(() => el.remove(), 300);
        }, 2800);
    }

    /* ─── Elements ──── */
    const subInput      = document.getElementById('sub-url');
    const urlInfo       = document.getElementById('url-info');
    const convertBtn    = document.getElementById('convert-btn');
    const spinner       = document.getElementById('spinner');
    const btnText       = document.getElementById('btn-text');
    const resultWrap    = document.getElementById('result-wrap');
    const resultUrl     = document.getElementById('result-url');
    const resultBox     = document.getElementById('result-box');
    const copyBtn       = document.getElementById('copy-btn');
    const clientValue   = document.getElementById('client-value');
    const pasteHint     = document.getElementById('paste-hint');
    const progressTrack = document.getElementById('progress-track');
    const progressBar   = document.getElementById('progress-bar');
    const nodeCountText = document.getElementById('node-count-text');
    const resultStatus  = document.getElementById('result-status');

    /* ─── Paste button ──── */
    pasteHint.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (isValidUrl(text)) {
                subInput.value = text;
                subInput.dispatchEvent(new Event('input'));
                showToast('已从剪贴板粘贴');
            } else {
                showToast('剪贴板内容不是有效链接', 'error');
            }
        } catch {
            showToast('无法访问剪贴板', 'error');
        }
    });

    /* ─── URL input ──── */
    subInput.addEventListener('input', () => {
        const url = subInput.value.trim();
        const valid = isValidUrl(url);
        subInput.classList.toggle('has-value', valid);
        convertBtn.disabled = !valid;
        selectTrigger.classList.toggle('disabled', !valid);
        resultWrap.style.display = 'none';
        urlInfo.classList.toggle('show', valid && isShortLink(url));
        pasteHint.classList.toggle('hidden', url.length > 0);
    });

    /* ─── Custom select ──── */
    const selectTrigger = document.getElementById('select-trigger');
    const dropdown      = document.getElementById('dropdown');
    const selText       = document.getElementById('selected-text');
    const clientIcon    = document.getElementById('client-icon');
    const options       = dropdown.querySelectorAll('.option');

    function closeDropdown() {
        selectTrigger.classList.remove('open');
        dropdown.classList.remove('open');
    }
    selectTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectTrigger.classList.contains('disabled')) return;
        const willOpen = !dropdown.classList.contains('open');
        selectTrigger.classList.toggle('open', willOpen);
        dropdown.classList.toggle('open', willOpen);
    });
    options.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            options.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            selText.textContent = opt.querySelector('.option-label').firstChild.textContent.trim();
            clientIcon.src = opt.dataset.img; // 将选中标签的图片更新为下拉框选中的图片
            clientValue.value = opt.dataset.value;
            closeDropdown();
        });
    });
    document.addEventListener('click', closeDropdown);

    /* ─── Progress animation ──── */
    function startProgress() {
        progressTrack.classList.add('active');
        progressBar.style.width = '0%';
        progressBar.style.transition = 'none';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                progressBar.style.transition = 'width 2.8s cubic-bezier(0.4,0,0.2,1)';
                progressBar.style.width = '85%';
            });
        });
    }
    function finishProgress(success) {
        progressBar.style.transition = 'width 0.35s ease';
        progressBar.style.width = success ? '100%' : '0%';
        setTimeout(() => {
            progressTrack.classList.remove('active');
            progressBar.style.width = '0%';
        }, 500);
    }

    /* ─── Convert ──── */
    convertBtn.addEventListener('click', async () => {
        const url = subInput.value.trim();
        if (!isValidUrl(url)) { showToast('请检查订阅链接是否有效', 'error'); return; }

        showToast('正在生成订阅链接…', 'warning');
        startProgress();
        spinner.style.display = 'block';
        btnText.style.display = 'none';
        convertBtn.disabled = true;
        selectTrigger.classList.add('disabled');
        resultWrap.style.display = 'none';

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, client: clientValue.value }),
            });
            const data = await res.json();
            if (res.ok) {
                resultUrl.textContent = data.shortUrl;
                resultStatus.style.opacity = '1';
                const nc = data.nodeCount ?? 0;
                nodeCountText.textContent = nc > 0 ? `${nc} 个节点` : '已就绪';
                resultWrap.style.display = 'block';
                finishProgress(true);
                navigator.clipboard.writeText(data.shortUrl)
                    .then(() => showToast(`转换成功 · ${nc} 节点，已自动复制`))
                    .catch(() => showToast('转换成功，请手动复制链接', 'warning'));
            } else {
                finishProgress(false);
                showToast(data.message || '生成失败，未知错误', 'error');
            }
        } catch {
            finishProgress(false);
            showToast('请求失败，请检查网络或联系管理员', 'error');
        } finally {
            spinner.style.display = 'none';
            btnText.style.display = 'inline';
            if (isValidUrl(subInput.value.trim())) {
                convertBtn.disabled = false;
                selectTrigger.classList.remove('disabled');
            }
        }
    });

    /* ─── Copy ──── */
    function doCopy(e) {
        e && e.stopPropagation();
        const text = resultUrl.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text)
            .then(() => showToast('链接已复制到剪贴板'))
            .catch(() => showToast('复制失败', 'error'));
    }
    resultBox.addEventListener('click', doCopy);
    copyBtn.addEventListener('click', doCopy);
    document.getElementById('copy-full-btn').addEventListener('click', doCopy);

    /* ─── QR Code ──── */
    // Minimal QR encoder (data matrix for short URLs)
    const modalOverlay = document.getElementById('modal-overlay');
    const qrCanvas     = document.getElementById('qr-canvas');
    const modalClose   = document.getElementById('modal-close');
    const qrBtn        = document.getElementById('qr-btn');

    qrBtn.addEventListener('click', () => {
        const url = resultUrl.textContent;
        if (!url) return;
        drawQR(url);
        modalOverlay.classList.add('open');
    });
    modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    // Simple QR via QR Server API rendered to canvas
    function drawQR(text) {
        const isDark = document.documentElement.classList.contains('dark');
        const bg = isDark ? '12131F' : 'FFFFFF';
        const fg = isDark ? 'A5B4FC' : '5B5EF4';
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const ctx = qrCanvas.getContext('2d');
            ctx.clearRect(0,0,200,200);
            ctx.drawImage(img, 0, 0, 200, 200);
        };
        img.onerror = () => {
            // fallback: just draw text
            const ctx = qrCanvas.getContext('2d');
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(0,0,200,200);
            ctx.fillStyle = '#6b7280';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('二维码加载失败', 100, 100);
        };
        img.src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(text)}&size=200x200&color=${fg}&bgcolor=${bg}&margin=10&qzone=2`;
    }
</script>
</body>
</html>
