    <style>
        /* ══ 设计令牌 ══ */
        :root {
            --bg:              #f0f2fa;
            --bg-card:         rgba(255,255,255,0.82);
            --bg-glass:        rgba(255,255,255,0.58);
            --bg-input:        rgba(248,249,255,0.80);
            --bg-input-hov:    rgba(255,255,255,0.96);
            --border:          rgba(80,70,180,0.09);
            --border-subtle:   rgba(0,0,0,0.048);
            --border-focus:    rgba(88,96,246,0.45);
            --text-primary:    #12121c;
            --text-secondary:  #50506a;
            --text-muted:      #9494ae;
            --text-placeholder:#b8b8d0;

            --accent:          #5660f6;
            --accent-2:        #9055f5;
            --accent-3:        #00c4cc;
            --accent-light:    rgba(86,96,246,0.08);
            --accent-glow:     rgba(86,96,246,0.25);
            --accent-mid:      rgba(86,96,246,0.55);

            --orb-a:           rgba(86,96,246,0.12);
            --orb-b:           rgba(144,85,245,0.09);
            --orb-c:           rgba(0,196,204,0.07);

            --btn-shadow:      0 6px 24px -4px rgba(86,96,246,0.40), 0 2px 6px -2px rgba(86,96,246,0.18);
            --btn-shadow-hov:  0 12px 32px -6px rgba(86,96,246,0.55), 0 4px 12px -4px rgba(86,96,246,0.25);
            --card-shadow:     0 24px 64px -16px rgba(50,40,140,0.10), 0 2px 8px rgba(0,0,0,0.035), inset 0 1px 0 rgba(255,255,255,0.72);
            --input-shadow-f:  0 0 0 3px rgba(86,96,246,0.12), 0 1px 4px rgba(86,96,246,0.08);
            --result-bg:       rgba(86,96,246,0.04);
            --result-bg-hov:   rgba(86,96,246,0.08);

            --success:         #0dba83;
            --warn-bg:         rgba(251,146,60,0.07);
            --warn-border:     rgba(251,146,60,0.20);
            --warn-text:       #c46800;

            --radius-card:     24px;
            --radius-input:    12px;
            --radius-btn:      12px;
            --transition:      0.20s cubic-bezier(0.4,0,0.2,1);
            --spring:          0.28s cubic-bezier(0.34,1.56,0.64,1);
        }

        html.dark {
            --bg:              #0a0b14;
            --bg-card:         rgba(16,17,30,0.96);
            --bg-glass:        rgba(255,255,255,0.025);
            --bg-input:        rgba(255,255,255,0.038);
            --bg-input-hov:    rgba(255,255,255,0.072);
            --border:          rgba(130,120,255,0.10);
            --border-subtle:   rgba(255,255,255,0.055);
            --border-focus:    rgba(120,130,252,0.48);
            --text-primary:    #eceef8;
            --text-secondary:  #9090b5;
            --text-muted:      #50506a;
            --text-placeholder:#30304a;
            --orb-a:           rgba(86,96,246,0.16);
            --orb-b:           rgba(144,85,245,0.12);
            --orb-c:           rgba(0,196,204,0.06);
            --accent-light:    rgba(86,96,246,0.12);
            --accent-glow:     rgba(86,96,246,0.20);
            --btn-shadow:      0 6px 24px -4px rgba(86,96,246,0.32);
            --btn-shadow-hov:  0 12px 32px -6px rgba(86,96,246,0.46);
            --card-shadow:     0 24px 64px -16px rgba(0,0,0,0.72), 0 2px 8px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.04);
            --input-shadow-f:  0 0 0 3px rgba(86,96,246,0.15);
            --result-bg:       rgba(86,96,246,0.06);
            --result-bg-hov:   rgba(86,96,246,0.12);
            --warn-bg:         rgba(251,146,60,0.07);
            --warn-border:     rgba(251,146,60,0.16);
            --warn-text:       #f0a535;
        }

        /* ══ Reset & base ══ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { background-color: var(--bg); min-height: 100%; transition: background-color 0.38s; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: transparent;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
            position: relative;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.38s;
        }

        body::after {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 128px 128px; opacity: 0.55; pointer-events: none;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(circle, var(--border-subtle) 1px, transparent 1px);
            background-size: 26px 26px; pointer-events: none; transition: opacity 0.38s;
        }

        /* ══ Ambient orbs ══ */
        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(100px); }
        .orb-a {
            width: min(62vw, 440px); height: min(62vw, 440px);
            top: -16%; right: -10%; background: radial-gradient(circle, var(--orb-a), transparent 68%);
            animation: driftA 20s ease-in-out infinite;
        }
        .orb-b {
            width: min(72vw, 500px); height: min(72vw, 500px);
            bottom: -20%; left: -16%; background: radial-gradient(circle, var(--orb-b), transparent 68%);
            animation: driftB 24s ease-in-out infinite;
        }
        .orb-c {
            width: min(42vw, 300px); height: min(42vw, 300px);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: radial-gradient(circle, var(--orb-c), transparent 68%);
            animation: driftC 16s ease-in-out infinite;
        }
        @keyframes driftA { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(-22px,32px) scale(1.07);} 66%{transform:translate(16px,-22px) scale(0.95);} }
        @keyframes driftB { 0%,100%{transform:translate(0,0) scale(1);} 40%{transform:translate(32px,-28px) scale(1.09);} 70%{transform:translate(-12px,22px) scale(0.93);} }
        @keyframes driftC { 0%,100%{transform:translate(-50%,-50%) scale(1); opacity: 0.6;} 50%{transform:translate(-50%,-50%) scale(1.18); opacity: 1;} }

        /* ══ Card ══ */
        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 28px 26px 26px; 
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(36px) saturate(1.9);
            -webkit-backdrop-filter: blur(36px) saturate(1.9);
            animation: cardIn 0.58s cubic-bezier(0.22,1,0.36,1) both;
        }
        @media (max-width: 480px) {
            .card { padding: 22px 18px 20px; border-radius: 20px; }
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(24px) scale(0.965); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.70) 40%, rgba(255,255,255,0.70) 60%, transparent);
            border-radius: 1px;
        }
        html.dark .card::before { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent); }

        /* ══ Header ══ */
        .header {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            margin-bottom: 24px;
        }
        .logo-wrap { position: relative; }
        .logo-ring {
            position: absolute; inset: -9px; border-radius: 50%;
            border: 1.5px dashed var(--accent-mid); opacity: 0.3;
            animation: spinRing 20s linear infinite;
        }
        @keyframes spinRing { to { transform: rotate(360deg); } }
        .logo-icon {
            width: 44px; height: 44px; /* 图标缩小 */
            background: linear-gradient(145deg, var(--accent) 0%, var(--accent-2) 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 28px -6px var(--accent-glow), 0 2px 6px rgba(86,96,246,0.15), inset 0 1px 0 rgba(255,255,255,0.30);
            position: relative; z-index: 1; transition: transform 0.3s var(--spring), box-shadow 0.3s;
        }
        .logo-icon:hover { transform: scale(1.06) rotate(-3deg); box-shadow: 0 16px 36px -8px var(--accent-glow); }
        .logo-icon svg { width: 20px; height: 20px; stroke: #fff; } /* 内部图形等比例缩小 */
        .logo-glow {
            position: absolute; inset: -7px; border-radius: 16px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            animation: logoGlow 3.5s ease-in-out infinite; z-index: 0;
        }
        @keyframes logoGlow { 0%,100%{opacity:0.45;transform:scale(1);} 50%{opacity:0.9;transform:scale(1.12);} }

        .header-text { text-align: center; }
        .title {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(130deg, var(--accent) 0%, var(--accent-2) 55%, var(--accent-3) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1.2; margin-top: 4px;
        }

        /* ══ Divider ══ */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle) 25%, var(--border-subtle) 75%, transparent);
            margin: 0 -2px 24px;
            position: relative; overflow: visible;
        }
        .divider::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 32px; height: 3px; border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2)); opacity: 0.35;
        }

        /* ══ Field group ══ */
        .field { margin-bottom: 22px; } /* 增加了原有的间距，使其不拥挤 */
        .label {
            display: flex; align-items: center; gap: 6px;
            font-size: 10.5px; font-weight: 600; letter-spacing: 0.8px;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 8px; user-select: none;
        }
        .label-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2)); flex-shrink: 0;
        }

        /* ══ Input ══ */
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); pointer-events: none; transition: color var(--transition), transform var(--transition);
        }
        .input-icon svg { width: 14px; height: 14px; stroke: currentColor; }
        .input-wrap:focus-within .input-icon { color: var(--accent); transform: translateY(-50%) scale(1.08); }

        input[type="url"] {
            width: 100%; height: 44px; 
            padding: 0 12px 0 38px;
            background: var(--bg-input); border: 1.5px solid var(--border); border-radius: var(--radius-input);
            color: var(--text-primary); font-family: inherit; font-size: 13.5px; outline: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
            -webkit-appearance: none;
        }
        input[type="url"]::placeholder { color: var(--text-placeholder); }
        input[type="url"]:focus { border-color: var(--border-focus); background: var(--bg-input-hov); box-shadow: var(--input-shadow-f); }
        input[type="url"].has-value { background: var(--bg-input-hov); }

        /* Paste hint */
        .paste-hint {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            font-size: 10.5px; font-weight: 600; color: var(--text-muted);
            background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: 7px;
            padding: 3px 8px; cursor: pointer; transition: all var(--transition);
            user-select: none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .paste-hint:hover { color: var(--accent); border-color: var(--border-focus); background: var(--accent-light); transform: translateY(-50%) scale(1.04); }
        .paste-hint:active { transform: translateY(-50%) scale(0.95); }
        .paste-hint.hidden { display: none; }

        .url-info {
            display: none; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px;
            background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 10px;
            font-size: 11.5px; color: var(--warn-text); animation: slideDown 0.20s ease;
        }
        .url-info.show { display: flex; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }

        /* ══ Client select ══ */
        .select-wrap { position: relative; }
        .select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; height: 44px;
            padding: 0 12px; background: var(--bg-input); border: 1.5px solid var(--border);
            border-radius: var(--radius-input); cursor: pointer; font-family: inherit;
            font-size: 13.5px; color: var(--text-primary); user-select: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
        }
        .select-trigger:focus { outline: none; }
        .select-trigger.open { border-color: var(--border-focus); background: var(--bg-input-hov); box-shadow: var(--input-shadow-f); }
        .select-trigger.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .select-left { display: flex; align-items: center; gap: 10px; }

        .client-icon { width: 22px; height: 22px; border-radius: 5px; object-fit: cover; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: transform var(--transition); }
        html.dark .client-icon { box-shadow: 0 2px 8px rgba(0,0,0,0.35); }
        .select-trigger.open .client-icon { transform: scale(0.94); }

        .chevron-wrap {
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; background: var(--border-subtle); flex-shrink: 0;
            transition: background var(--transition), transform var(--transition);
        }
        .select-trigger.open .chevron-wrap { background: var(--accent-light); transform: rotate(180deg); }
        .chevron-wrap svg { width: 12px; height: 12px; stroke: var(--text-secondary); }

        .dropdown {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 50;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 6px; box-shadow: 0 20px 52px -10px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.06);
            backdrop-filter: blur(28px) saturate(1.8); -webkit-backdrop-filter: blur(28px) saturate(1.8);
            opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.965);
            transform-origin: top center; transition: opacity 0.18s, transform 0.24s cubic-bezier(0.34,1.3,0.64,1), visibility 0.18s;
        }
        .dropdown.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

        .option {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px;
            font-size: 13px; color: var(--text-secondary); cursor: pointer;
            transition: background var(--transition), color var(--transition); position: relative; overflow: hidden;
        }
        .option::before { content: ''; position: absolute; inset: 0; background: var(--accent-light); opacity: 0; transition: opacity var(--transition); }
        .option:hover::before { opacity: 1; }
        .option:hover { color: var(--accent); }
        .option.selected { color: var(--accent); font-weight: 600; }
        .option.selected::before { opacity: 1; }

        .option-icon {
            width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.07);
            transition: transform var(--spring), box-shadow var(--transition); position: relative; z-index: 1;
        }
        html.dark .option-icon { box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .option-icon img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; display: block; }
        .option:hover .option-icon { transform: scale(1.08); }
        .option.selected .option-icon { transform: scale(1.12); box-shadow: 0 4px 14px rgba(86,96,246,0.28); }

        .option-label { flex: 1; position: relative; z-index: 1; }

        .check-icon {
            width: 14px; height: 14px; stroke: var(--accent); flex-shrink: 0; opacity: 0;
            transform: scale(0.5) rotate(-10deg); transition: opacity 0.16s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);

        }
        .option.selected .check-icon { opacity: 1; transform: scale(1) rotate(0deg); }

        /* ══ Convert button ══ */
        .btn-convert {
            position: relative; overflow: hidden; width: 100%; height: 46px; 
            margin-top: 18px; /* 增加了按钮上方的间距 */
            background: linear-gradient(130deg, var(--accent) 0%, var(--accent-2) 100%);
            border: none; border-radius: var(--radius-btn); color: #fff;
            font-family: 'DM Sans', inherit; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.18s var(--spring), box-shadow 0.18s, opacity 0.18s; box-shadow: var(--btn-shadow);
        }
        .btn-convert:not(:disabled):hover { transform: translateY(-2px) scale(1.005); box-shadow: var(--btn-shadow-hov); }
        .btn-convert:not(:disabled):active { transform: translateY(1px) scale(0.984); box-shadow: 0 4px 14px -4px var(--accent-glow); }
        .btn-convert:disabled { opacity: 0.44; cursor: not-allowed; }
        .btn-convert::before {
            content: ''; position: absolute; inset: 0; background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.28) 50%, transparent 75%); transform: translateX(-140%);
        }
        .btn-convert:not(:disabled):hover::before { transform: translateX(140%); transition: transform 0.70s ease; }
        .btn-convert::after { content: ''; position: absolute; top: 0; left: 12%; right: 12%; height: 1px; background: rgba(255,255,255,0.38); border-radius: 1px; }

        .btn-ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.28); pointer-events: none; transform: scale(0); animation: ripple 0.6s linear; }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.28); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══ Progress track ══ */
        .progress-track {
            height: 2px; background: var(--border-subtle); border-radius: 2px; margin-top: 10px;
            overflow: hidden; opacity: 0; transition: opacity 0.2s;
        }
        .progress-track.active { opacity: 1; }
        .progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
            background-size: 200% 100%; border-radius: 2px; transition: width 2.8s cubic-bezier(0.4,0,0.2,1);
            animation: progressShimmer 2s linear infinite;
        }
        @keyframes progressShimmer { 0%{background-position: 100% 0;} 100%{background-position: -100% 0;} }

        /* ══ Result box ══ */
        .result-wrap {
            margin-top: 16px; display: none; animation: resultIn 0.32s cubic-bezier(0.34,1.2,0.64,1) both;
        }
        @keyframes resultIn { from{opacity:0;transform:translateY(10px) scale(0.975);} to{opacity:1;transform:translateY(0) scale(1);} }
        .result-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .result-status {
            display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--success); opacity: 0; animation: fadeIn 0.3s 0.15s ease both;
        }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .status-dot {
            width: 5px; height: 5px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 0 rgba(13,186,131,0.4); animation: pulseDot 2.2s ease-in-out infinite;
        }
        @keyframes pulseDot { 0%{box-shadow:0 0 0 0 rgba(13,186,131,0.4);} 50%{box-shadow:0 0 0 4px rgba(13,186,131,0);} 100%{box-shadow:0 0 0 0 rgba(13,186,131,0);} }

        .result-box {
            position: relative; display: flex; align-items: center; gap: 8px; padding: 12px 42px 12px 14px;
            background: var(--result-bg); border: 1.5px solid var(--border); border-radius: var(--radius-input);
            cursor: pointer; transition: border-color var(--transition), background var(--transition), box-shadow var(--transition), transform var(--transition); overflow: hidden;
        }
        .result-box::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; border-radius: 0 3px 3px 0; background: linear-gradient(180deg, var(--accent), var(--accent-2)); opacity: 0.5; }
        .result-box:hover { border-color: var(--border-focus); background: var(--result-bg-hov); box-shadow: var(--input-shadow-f); transform: translateY(-1px); }
        .result-box:active { transform: translateY(0) scale(0.995); }
        .result-url { font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.5; color: var(--text-secondary); word-break: break-all; flex: 1; padding-left: 2px; }

        /* QR / copy row */
        .result-actions { display: flex; gap: 8px; margin-top: 8px; }
        .action-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            height: 36px;
            background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 10px;
            font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
        }
        .action-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent-light); opacity: 0; transition: opacity var(--transition); }
        .action-btn:hover::before { opacity: 1; }
        .action-btn:hover { border-color: var(--border-focus); color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px -4px var(--accent-glow); }
        .action-btn:active { transform: scale(0.95); }
        .action-btn svg { width: 13px; height: 13px; stroke: currentColor; position: relative; z-index: 1; }
        .action-btn span { position: relative; z-index: 1; }

        /* Inline copy button */
        .copy-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center; background: var(--bg-card);
            border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: all var(--transition);
        }
        .copy-btn:hover { border-color: var(--border-focus); color: var(--accent); transform: translateY(-50%) scale(1.10); background: var(--accent-light); box-shadow: 0 4px 12px -4px var(--accent-glow); }
        .copy-btn:active { transform: translateY(-50%) scale(0.88); }
        .copy-btn svg { width: 12px; height: 12px; stroke: currentColor; }

        /* ══ QR Modal ══ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.50); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.22s, visibility 0.22s;
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px 22px;
            box-shadow: 0 32px 80px -20px rgba(0,0,0,0.38); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            max-width: 260px; width: calc(100% - 40px); text-align: center; transform: translateY(14px) scale(0.94); transition: transform 0.28s cubic-bezier(0.34,1.2,0.64,1);
        }
        .modal-overlay.open .modal { transform: translateY(0) scale(1); }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; letter-spacing: -0.2px; }
        #qr-canvas { border-radius: 12px; max-width: 100%; }
        .modal-close {
            margin-top: 16px; width: 100%; height: 38px; background: var(--accent-light); border: 1px solid var(--border-focus);
            border-radius: 10px; color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition);
        }
        .modal-close:hover { background: var(--accent); color: #fff; box-shadow: var(--btn-shadow); }

        /* ══ Theme toggle ══ */
        .theme-btn {
            position: fixed; top: max(16px, env(safe-area-inset-top, 16px)); right: 16px; z-index: 100; width: 38px; height: 38px;
            border-radius: 50%; border: 1px solid var(--border); background: var(--bg-card); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.22s var(--spring), box-shadow 0.22s, background 0.35s, border-color 0.35s; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .theme-btn:hover { transform: scale(1.12) rotate(14deg); box-shadow: 0 4px 20px rgba(0,0,0,0.14); }
        .theme-btn:active { transform: scale(0.90); }
        .theme-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sun  { display: block; }
        .icon-moon { display: none; }
        html.dark .icon-sun  { display: none; }
        html.dark .icon-moon { display: block; }

        /* ══ Toasts ══ */
        #toast-container {
            position: fixed; bottom: max(20px, env(safe-area-inset-bottom, 20px)); left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 8px; align-items: center; width: max-content; max-width: calc(100vw - 32px); pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; color: #fff;
            backdrop-filter: blur(16px); box-shadow: 0 6px 28px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.20); animation: toastIn 0.40s cubic-bezier(0.34,1.56,0.64,1) both; white-space: nowrap;
        }
        .toast.out { animation: toastOut 0.28s ease forwards; }
        .toast-icon { flex-shrink: 0; line-height: 1; font-size: 14px; }
        @keyframes toastIn  { from{opacity:0;transform:translateY(16px) scale(0.84);} to{opacity:1;transform:translateY(0) scale(1);} }
        @keyframes toastOut { from{opacity:1;transform:translateY(0) scale(1);} to{opacity:0;transform:translateY(-12px) scale(0.88);} }

        /* ══ Focus visible ══ */
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    </style>
</head>

<script>
    const THEME_COLORS = { light: '#f0f2fa', dark: '#0a0b14' };
    const themeMeta = document.getElementById('theme-meta');
    function applyThemeColor(isDark) {
        const color = isDark ? THEME_COLORS.dark : THEME_COLORS.light;
        themeMeta.setAttribute('content', '#000000');
        requestAnimationFrame(() => themeMeta.setAttribute('content', color));
    }
    function setTheme(isDark, save = true) {
        document.documentElement.classList.toggle('dark', isDark);
        if (save) localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyThemeColor(isDark);
    }
    (function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(saved === 'dark' || (!saved && prefersDark), false);
    })();
    document.getElementById('theme-toggle').addEventListener('click', () => {
        setTheme(!document.documentElement.classList.contains('dark'));
    });

    const SHORT_DOMAINS = [
        'suo.yt','t.cn','bit.ly','tinyurl.com','short.link','dwz.cn',
        'u.nu','gg.gg','is.gd','v.gd','cutt.ly','rebrand.ly','t.co',
        'goo.gl','v1.mk','d1.mk','dlj.tf','sub.cm'
    ];
    function isValidUrl(s) {
        if (!s || !s.trim().toLowerCase().startsWith('http')) return false;
        try { new URL(s); return true; } catch { return false; }
    }
    function isShortLink(url) {
        try {
            const h = new URL(url).hostname.toLowerCase();
            return SHORT_DOMAINS.some(d => h === d || h.endsWith('.' + d));
        } catch { return false; }
    }

    const TOAST_CONFIG = {
        success: { bg: 'rgba(13,186,131,0.94)',  icon: '✓' },
        error:   { bg: 'rgba(239,68,68,0.94)',   icon: '✕' },
        warning: { bg: 'rgba(245,158,11,0.94)',  icon: '⚠' },
    };
    const toastContainer = document.getElementById('toast-container');
    function showToast(msg, type = 'success') {
        if (type === 'warning') {
            toastContainer.querySelectorAll('.toast[data-type="warning"]').forEach(t => t.remove());
        }
        const cfg = TOAST_CONFIG[type] || TOAST_CONFIG.success;
        const el = document.createElement('div');
        el.className = 'toast';
        el.dataset.type = type;
        el.style.background = cfg.bg;
        el.innerHTML = `<span class="toast-icon">${cfg.icon}</span><span>${msg}</span>`;
        toastContainer.appendChild(el);
        setTimeout(() => {
            el.classList.add('out');
            setTimeout(() => el.remove(), 300);
        }, 2800);
    }

    const subInput      = document.getElementById('sub-url');
    const urlInfo       = document.getElementById('url-info');
    const convertBtn    = document.getElementById('convert-btn');
    const spinner       = document.getElementById('spinner');
    const btnText       = document.getElementById('btn-text');
    const resultWrap    = document.getElementById('result-wrap');
    const resultUrl     = document.getElementById('result-url');
    const resultBox     = document.getElementById('result-box');
    const copyBtn       = document.getElementById('copy-btn');
    const clientValue   = document.getElementById('client-value');
    const pasteHint     = document.getElementById('paste-hint');
    const progressTrack = document.getElementById('progress-track');
    const progressBar   = document.getElementById('progress-bar');
    const nodeCountText = document.getElementById('node-count-text');
    const resultStatus  = document.getElementById('result-status');

    convertBtn.addEventListener('pointerdown', (e) => {
        if (convertBtn.disabled) return;
        const rect = convertBtn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        const ripple = document.createElement('span');
        ripple.className = 'btn-ripple';
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
        convertBtn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
    });

    pasteHint.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (isValidUrl(text)) {
                subInput.value = text;
                subInput.dispatchEvent(new Event('input'));
                showToast('已从剪贴板粘贴');
            } else {
                showToast('剪贴板内容不是有效链接', 'error');
            }
        } catch {
            showToast('无法访问剪贴板', 'error');
        }
    });

    subInput.addEventListener('input', () => {
        const url = subInput.value.trim();
        const valid = isValidUrl(url);
        subInput.classList.toggle('has-value', valid);
        convertBtn.disabled = !valid;
        selectTrigger.classList.toggle('disabled', !valid);
        resultWrap.style.display = 'none';
        urlInfo.classList.toggle('show', valid && isShortLink(url));
        pasteHint.classList.toggle('hidden', url.length > 0);
    });

    const selectTrigger = document.getElementById('select-trigger');
    const dropdown      = document.getElementById('dropdown');
    const selText       = document.getElementById('selected-text');
    const clientIcon    = document.getElementById('client-icon');
    const options       = dropdown.querySelectorAll('.option');

    function closeDropdown() {
        selectTrigger.classList.remove('open');
        dropdown.classList.remove('open');
    }
    selectTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectTrigger.classList.contains('disabled')) return;
        const willOpen = !dropdown.classList.contains('open');
        selectTrigger.classList.toggle('open', willOpen);
        dropdown.classList.toggle('open', willOpen);
    });
    options.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            options.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            selText.textContent = opt.querySelector('.option-label').firstChild.textContent.trim();
            clientIcon.src = opt.dataset.img;
            clientValue.value = opt.dataset.value;
            closeDropdown();
        });
    });
    document.addEventListener('click', closeDropdown);

    function startProgress() {
        progressTrack.classList.add('active');
        progressBar.style.width = '0%';
        progressBar.style.transition = 'none';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                progressBar.style.transition = 'width 2.8s cubic-bezier(0.4,0,0.2,1)';
                progressBar.style.width = '85%';
            });
        });
    }
    function finishProgress(success) {
        progressBar.style.transition = 'width 0.35s ease';
        progressBar.style.width = success ? '100%' : '0%';
        setTimeout(() => {
            progressTrack.classList.remove('active');
            progressBar.style.width = '0%';
        }, 500);
    }

    convertBtn.addEventListener('click', async () => {
        const url = subInput.value.trim();
        if (!isValidUrl(url)) { showToast('请检查订阅链接是否有效', 'error'); return; }

        showToast('正在生成订阅链接…', 'warning');
        startProgress();
        spinner.style.display = 'block';
        btnText.style.display = 'none';
        convertBtn.disabled = true;
        selectTrigger.classList.add('disabled');
        resultWrap.style.display = 'none';

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, client: clientValue.value }),
            });
            const data = await res.json();
            if (res.ok) {
                resultUrl.textContent = data.shortUrl;
                resultStatus.style.opacity = '1';
                const nc = data.nodeCount ?? 0;
                nodeCountText.textContent = nc > 0 ? `${nc} 个节点` : '已就绪';
                resultWrap.style.display = 'block';
                finishProgress(true);
                navigator.clipboard.writeText(data.shortUrl)
                    .then(() => showToast(`转换成功 · ${nc} 节点，已自动复制`))
                    .catch(() => showToast('转换成功，请手动复制链接', 'warning'));
            } else {
                finishProgress(false);
                showToast(data.message || '生成失败，未知错误', 'error');
            }
        } catch {
            finishProgress(false);
            showToast('请求失败，请检查网络或联系管理员', 'error');
        } finally {
            spinner.style.display = 'none';
            btnText.style.display = 'inline';
            if (isValidUrl(subInput.value.trim())) {
                convertBtn.disabled = false;
                selectTrigger.classList.remove('disabled');
            }
        }
    });

    function doCopy(e) {
        e && e.stopPropagation();
        const text = resultUrl.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text)
            .then(() => showToast('链接已复制到剪贴板'))
            .catch(() => showToast('复制失败', 'error'));
    }
    resultBox.addEventListener('click', doCopy);
    copyBtn.addEventListener('click', doCopy);
    document.getElementById('copy-full-btn').addEventListener('click', doCopy);

    const modalOverlay = document.getElementById('modal-overlay');
    const qrCanvas     = document.getElementById('qr-canvas');
    const modalClose   = document.getElementById('modal-close');
    const qrBtn        = document.getElementById('qr-btn');

    qrBtn.addEventListener('click', () => {
        const url = resultUrl.textContent;
        if (!url) return;
        drawQR(url);
        modalOverlay.classList.add('open');
    });
    modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function drawQR(text) {
        const isDark = document.documentElement.classList.contains('dark');
        const bg = isDark ? '0A0B14' : 'FFFFFF';
        const fg = isDark ? 'A5B4FC' : '5660F6';
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const ctx = qrCanvas.getContext('2d');
            ctx.clearRect(0,0,200,200);
            ctx.drawImage(img, 0, 0, 200, 200);
        };
        img.onerror = () => {
            const ctx = qrCanvas.getContext('2d');
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(0,0,200,200);
            ctx.fillStyle = '#6b7280';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('二维码加载失败', 100, 100);
        };
        img.src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(text)}&size=200x200&color=${fg}&bgcolor=${bg}&margin=10&qzone=2`;
    }
</script>
</body>
</html>
