<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>订阅转换</title>

    <!-- iOS Safari theme-color: 初始由JS接管，此处只保留一个无media的占位 -->
    <meta name="theme-color" content="#f0f2f8" id="theme-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ── 设计令牌 ── */
        :root {
            /* Light palette */
            --bg:           #f0f2f8;
            --bg-card:      rgba(255,255,255,0.82);
            --bg-input:     rgba(255,255,255,0.70);
            --bg-input-hov: rgba(255,255,255,0.90);
            --border:       rgba(0,0,0,0.07);
            --border-focus: rgba(99,102,241,0.55);
            --text-primary: #18181b;
            --text-secondary:#52525b;
            --text-placeholder:#a1a1aa;
            --accent-1:     #6366f1;
            --accent-2:     #8b5cf6;
            --accent-3:     #06b6d4;
            --orb-1:        rgba(99,102,241,0.13);
            --orb-2:        rgba(139,92,246,0.10);
            --btn-shadow:   0 8px 24px -6px rgba(99,102,241,0.45);
            --card-shadow:  0 24px 64px -16px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            --result-bg:    rgba(245,247,255,0.9);
            --toast-success:#10b981;
            --toast-error:  #ef4444;
            --toast-warn:   #f59e0b;
        }
        html.dark {
            --bg:           #0d0e14;
            --bg-card:      rgba(17,18,27,0.92);
            --bg-input:     rgba(255,255,255,0.04);
            --bg-input-hov: rgba(255,255,255,0.07);
            --border:       rgba(255,255,255,0.07);
            --border-focus: rgba(129,140,248,0.50);
            --text-primary: #f1f1f3;
            --text-secondary:#a1a1aa;
            --text-placeholder:#3f3f52;
            --orb-1:        rgba(99,102,241,0.18);
            --orb-2:        rgba(139,92,246,0.14);
            --btn-shadow:   0 8px 24px -6px rgba(99,102,241,0.35);
            --card-shadow:  0 24px 64px -16px rgba(0,0,0,0.6);
            --result-bg:    rgba(255,255,255,0.04);
        }

        /* ── Reset & base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            background-color: var(--bg);
            /* 关键: 让html背景填满Safari橡皮筋区域 */
            min-height: 100%;
            transition: background-color 0.35s;
        }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            background: transparent;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
            position: relative;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.35s;
        }

        /* ── Ambient orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            animation: breathe 12s ease-in-out infinite;
            transition: background 0.5s;
        }
        .orb-1 {
            width: min(55vw, 380px); height: min(55vw, 380px);
            top: -12%; right: -10%;
            background: radial-gradient(circle, var(--orb-1), transparent 70%);
        }
        .orb-2 {
            width: min(65vw, 440px); height: min(65vw, 440px);
            bottom: -15%; left: -12%;
            background: radial-gradient(circle, var(--orb-2), transparent 70%);
            animation-delay: -6s;
        }
        @keyframes breathe {
            0%,100% { transform: scale(1); opacity: 0.8; }
            50%      { transform: scale(1.12); opacity: 1; }
        }

        /* ── Grid texture overlay ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.35s;
        }

        /* ── Card ── */
        .card {
            position: relative; z-index: 10;
            width: 100%; max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px 32px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(28px) saturate(1.6);
            -webkit-backdrop-filter: blur(28px) saturate(1.6);
            animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        @media (max-width: 480px) {
            .card { padding: 28px 22px; border-radius: 24px; }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px -4px rgba(99,102,241,0.45);
        }
        .logo-icon svg { width: 24px; height: 24px; stroke: #fff; }
        .title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 60%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 12.5px;
            color: var(--text-placeholder);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ── Field group ── */
        .field { margin-bottom: 20px; }
        .label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* ── Input ── */
        .input-wrap { position: relative; }
        input[type="url"] {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }
        input[type="url"]::placeholder { color: var(--text-placeholder); }
        input[type="url"]:focus {
            border-color: var(--border-focus);
            background: var(--bg-input-hov);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.10);
        }
        input[type="url"].has-value { background: var(--bg-input-hov); }

        /* ── URL info badge ── */
        .url-info {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 9px 14px;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.20);
            border-radius: 10px;
            font-size: 12.5px;
            color: #d97706;
            animation: fadeSlideIn 0.25s ease;
        }
        html.dark .url-info { color: #fbbf24; }
        .url-info.show { display: flex; }
        @keyframes fadeSlideIn {
            from { opacity:0; transform:translateY(-4px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── Custom select ── */
        .select-wrap { position: relative; }
        .select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 50px;
            padding: 0 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            user-select: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .select-trigger:focus { outline: none; }
        .select-trigger.disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .select-trigger.open {
            border-color: var(--border-focus);
            background: var(--bg-input-hov);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.10);
        }
        .chevron {
            width: 8px; height: 8px;
            border-left: 2px solid var(--text-secondary);
            border-bottom: 2px solid var(--text-secondary);
            transform: rotate(-45deg) translateY(-2px);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            flex-shrink: 0;
        }
        .select-trigger.open .chevron { transform: rotate(135deg) translateY(-2px); }

        .dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            z-index: 50;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px;
            box-shadow: 0 16px 40px -8px rgba(0,0,0,0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px) scale(0.97);
            transform-origin: top;
            transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34,1.2,0.64,1), visibility 0.2s;
        }
        .dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            gap: 8px;
        }
        .option:hover { background: rgba(99,102,241,0.08); color: var(--accent-1); }
        .option.selected {
            color: var(--accent-1);
            font-weight: 600;
            background: rgba(99,102,241,0.06);
        }
        .check-icon {
            width: 16px; height: 16px;
            stroke: var(--accent-1);
            flex-shrink: 0;
            opacity: 0;
            transform: scale(0.7);
            transition: opacity 0.15s, transform 0.15s;
        }
        .option.selected .check-icon { opacity: 1; transform: scale(1); }

        /* ── Convert button ── */
        .btn-convert {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 52px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
            box-shadow: var(--btn-shadow);
        }
        .btn-convert:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -8px rgba(99,102,241,0.55);
        }
        .btn-convert:not(:disabled):active {
            transform: translateY(0) scale(0.985);
            box-shadow: var(--btn-shadow);
        }
        .btn-convert:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Shimmer */
        .btn-convert::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.22) 50%, transparent 65%);
            transform: translateX(-100%);
            transition: transform 0s;
        }
        .btn-convert:not(:disabled):hover::after {
            transform: translateX(100%);
            transition: transform 0.6s ease;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Result box ── */
        .result-wrap {
            margin-top: 22px;
            display: none;
            animation: fadeSlideIn 0.3s ease both;
        }
        .result-box {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 48px 14px 16px;
            background: var(--result-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .result-box:hover { border-color: var(--border-focus); }
        .result-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
            word-break: break-all;
            flex: 1;
        }
        .copy-btn {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, transform 0.15s;
        }
        .copy-btn:hover { border-color: var(--border-focus); color: var(--accent-1); transform: translateY(-50%) scale(1.08); }
        .copy-btn:active { transform: translateY(-50%) scale(0.93); }
        .copy-btn svg { width: 13px; height: 13px; stroke: currentColor; }

        /* ── Theme toggle ── */
        .theme-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top, 20px));
            right: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s, background 0.35s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .theme-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .theme-btn:active { transform: scale(0.93); }
        .theme-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sun  { display: block; }
        .icon-moon { display: none; }
        html.dark .icon-sun  { display: none; }
        html.dark .icon-moon { display: block; }

        /* ── Toasts ── */
        #toast-container {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom, 24px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: max-content;
            max-width: calc(100vw - 40px);
            pointer-events: none;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 18px;
            border-radius: 40px;
            font-size: 13.5px;
            font-weight: 500;
            color: #fff;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
            white-space: nowrap;
        }
        .toast.out { animation: toastOut 0.3s ease forwards; }
        .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.7); flex-shrink: 0; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(12px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-8px) scale(0.9); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <button class="theme-btn" id="theme-toggle" aria-label="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div id="toast-container"></div>

    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
            </div>
            <h1 class="title">订阅转换</h1>
            <p class="subtitle">Subscription Converter</p>
        </div>

        <!-- URL input -->
        <div class="field">
            <label class="label" for="sub-url">原始订阅链接</label>
            <div class="input-wrap">
                <input type="url" id="sub-url" placeholder="粘贴订阅链接 https://..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
            </div>
            <div class="url-info" id="url-info">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                检测到短链接，将自动解析重定向后的地址
            </div>
        </div>

        <!-- Client select -->
        <div class="field">
            <label class="label">目标客户端</label>
            <div class="select-wrap">
                <div class="select-trigger disabled" id="select-trigger" tabindex="0">
                    <span id="selected-text">Clash (Meta)</span>
                    <div class="chevron"></div>
                </div>
                <div class="dropdown" id="dropdown">
                    <div class="option selected" data-value="c">
                        <span>Clash (Meta)</span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="option" data-value="x">
                        <span>Sing-Box</span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="option" data-value="g">
                        <span>Surge</span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="option" data-value="s">
                        <span>Shadowrocket</span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="option" data-value="l">
                        <span>Loon</span>
                        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                </div>
                <input type="hidden" id="client-value" value="c">
            </div>
        </div>

        <!-- Convert button -->
        <button class="btn-convert" id="convert-btn" disabled>
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">生成订阅链接</span>
        </button>

        <!-- Result -->
        <div class="result-wrap" id="result-wrap">
            <label class="label">生成结果</label>
            <div class="result-box" id="result-box">
                <code class="result-url" id="result-url"></code>
                <button class="copy-btn" id="copy-btn" title="复制链接">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

<script>
    /* ─── iOS Safari theme-color 修复 ─────────────────────────────────
       原理：只保留一个不带 media 属性的 meta，然后用 JS 直接修改 content。
       Safari 只有在检测到 DOM 变化时才会重新读取，所以每次切换都要
       先移除再重新插入，或者用 setAttribute 强制触发重绘。
    ──────────────────────────────────────────────────────────────── */
    const THEME_COLORS = { light: '#f0f2f8', dark: '#0d0e14' };
    const themeMeta = document.getElementById('theme-meta');

    function applyThemeColor(isDark) {
        const color = isDark ? THEME_COLORS.dark : THEME_COLORS.light;
        // 强制 Safari 感知变化：先设为空再设回目标色
        themeMeta.setAttribute('content', '#000000');
        requestAnimationFrame(() => {
            themeMeta.setAttribute('content', color);
        });
    }

    function setTheme(isDark, save = true) {
        if (isDark) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        if (save) localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyThemeColor(isDark);
    }

    // 初始化主题（尽早执行，防止闪烁）
    (function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved === 'dark' || (!saved && prefersDark);
        setTheme(isDark, false);
    })();

    document.getElementById('theme-toggle').addEventListener('click', () => {
        setTheme(!document.documentElement.classList.contains('dark'));
    });

    /* ─── Helpers ──────────────────────────────────────────────────── */
    const SHORT_DOMAINS = [
        'suo.yt','t.cn','bit.ly','tinyurl.com','short.link','dwz.cn',
        'u.nu','gg.gg','is.gd','v.gd','cutt.ly','rebrand.ly','t.co',
        'goo.gl','v1.mk','d1.mk','dlj.tf','sub.cm'
    ];

    function isValidUrl(s) {
        if (!s || !s.trim().toLowerCase().startsWith('http')) return false;
        try { new URL(s); return true; } catch { return false; }
    }
    function isShortLink(url) {
        try {
            const h = new URL(url).hostname.toLowerCase();
            return SHORT_DOMAINS.some(d => h === d || h.endsWith('.' + d));
        } catch { return false; }
    }

    /* ─── Toast ────────────────────────────────────────────────────── */
    const toastContainer = document.getElementById('toast-container');
    const TOAST_COLORS = {
        success: 'rgba(16,185,129,0.92)',
        error:   'rgba(239,68,68,0.92)',
        warning: 'rgba(245,158,11,0.92)',
    };
    function showToast(msg, type = 'success') {
        if (type === 'warning') {
            toastContainer.querySelectorAll('.toast[data-type="warning"]').forEach(t => t.remove());
        }
        const el = document.createElement('div');
        el.className = 'toast';
        el.dataset.type = type;
        el.style.background = TOAST_COLORS[type] || TOAST_COLORS.success;
        el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
        toastContainer.appendChild(el);
        setTimeout(() => {
            el.classList.add('out');
            setTimeout(() => el.remove(), 320);
        }, 2600);
    }

    /* ─── URL input ────────────────────────────────────────────────── */
    const subInput    = document.getElementById('sub-url');
    const urlInfo     = document.getElementById('url-info');
    const convertBtn  = document.getElementById('convert-btn');
    const spinner     = document.getElementById('spinner');
    const btnText     = document.getElementById('btn-text');
    const resultWrap  = document.getElementById('result-wrap');
    const resultUrl   = document.getElementById('result-url');
    const resultBox   = document.getElementById('result-box');
    const copyBtn     = document.getElementById('copy-btn');
    const clientValue = document.getElementById('client-value');

    subInput.addEventListener('input', () => {
        const url = subInput.value.trim();
        const valid = isValidUrl(url);
        subInput.classList.toggle('has-value', valid);
        convertBtn.disabled = !valid;
        trigger.classList.toggle('disabled', !valid);
        resultWrap.style.display = 'none';
        urlInfo.classList.toggle('show', valid && isShortLink(url));
    });

    /* ─── Custom select ────────────────────────────────────────────── */
    const trigger  = document.getElementById('select-trigger');
    const dropdown = document.getElementById('dropdown');
    const selText  = document.getElementById('selected-text');
    const options  = dropdown.querySelectorAll('.option');

    function closeDropdown() {
        trigger.classList.remove('open');
        dropdown.classList.remove('open');
    }

    trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (trigger.classList.contains('disabled')) return;
        const willOpen = !dropdown.classList.contains('open');
        trigger.classList.toggle('open', willOpen);
        dropdown.classList.toggle('open', willOpen);
    });

    options.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            options.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            selText.textContent = opt.querySelector('span').textContent;
            clientValue.value = opt.dataset.value;
            closeDropdown();
        });
    });

    document.addEventListener('click', closeDropdown);

    /* ─── Convert ──────────────────────────────────────────────────── */
    convertBtn.addEventListener('click', async () => {
        const url = subInput.value.trim();
        if (!isValidUrl(url)) { showToast('请检查订阅链接是否有效', 'error'); return; }

        showToast('正在生成订阅链接…', 'warning');
        spinner.style.display = 'block';
        btnText.style.display = 'none';
        convertBtn.disabled = true;
        trigger.classList.add('disabled');
        resultWrap.style.display = 'none';

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, client: clientValue.value }),
            });
            const data = await res.json();
            if (res.ok) {
                resultUrl.textContent = data.shortUrl;
                resultWrap.style.display = 'block';
                navigator.clipboard.writeText(data.shortUrl)
                    .then(() => showToast(`解析成功 · ${data.nodeCount ?? 0} 节点，已复制`))
                    .catch(() => showToast('自动复制失败，请手动复制', 'error'));
            } else {
                showToast(data.message || '生成失败，未知错误', 'error');
            }
        } catch {
            showToast('请求失败，请检查网络或联系管理员', 'error');
        } finally {
            spinner.style.display = 'none';
            btnText.style.display = 'block';
            if (isValidUrl(subInput.value.trim())) {
                convertBtn.disabled = false;
                trigger.classList.remove('disabled');
            }
        }
    });

    /* ─── Copy ─────────────────────────────────────────────────────── */
    function doCopy(e) {
        e && e.stopPropagation();
        const text = resultUrl.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text)
            .then(() => showToast('链接已复制'))
            .catch(() => showToast('复制失败', 'error'));
    }
    resultBox.addEventListener('click', doCopy);
    copyBtn.addEventListener('click', doCopy);
</script>
</body>
</html>
