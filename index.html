<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth bg-slate-50 dark:bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>订阅转换</title>
    <meta name="theme-color" content="#f8fafc" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                    },
                    animation: {
                        'slow-pulse': 'pulse-orb 10s ease-in-out infinite',
                        'slide-up': 'slideUp 0.4s ease forwards',
                        'toast': 'slideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, fadeOut 0.4s ease 2.5s forwards',
                    },
                    keyframes: {
                        'pulse-orb': {
                            '0%, 100%': { transform: 'scale(1)', opacity: '0.5' },
                            '50%': { transform: 'scale(1.15)', opacity: '1' },
                        },
                        'slideUp': {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'slideIn': {
                            '0%': { opacity: '0', transform: 'translateX(100%)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        'fadeOut': {
                            '0%': { opacity: '1', transform: 'translateX(0)' },
                            '100%': { opacity: '0', transform: 'translateX(100%)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
    </style>
</head>

<body class="text-slate-900 dark:text-slate-100 min-h-[100dvh] flex items-center justify-center p-4 sm:p-8 relative overflow-x-hidden font-sans antialiased selection:bg-primary/30">

    <div class="fixed inset-0 z-[-2] bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-900 dark:to-slate-800 transition-colors duration-500"></div>

    <div class="fixed top-[-10%] right-[-10%] w-[50vw] h-[50vw] min-w-[300px] min-h-[300px] rounded-full bg-indigo-400/10 dark:bg-indigo-500/10 blur-[100px] sm:blur-[120px] animate-slow-pulse pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] min-w-[350px] min-h-[350px] rounded-full bg-purple-400/10 dark:bg-purple-500/10 blur-[100px] sm:blur-[120px] animate-slow-pulse pointer-events-none z-[-1]" style="animation-delay: -5s;"></div>

    <button id="theme-toggle" class="fixed top-6 right-6 z-50 bg-white/80 dark:bg-slate-800/80 border border-slate-200/50 dark:border-white/10 backdrop-blur-md w-11 h-11 rounded-full flex items-center justify-center shadow-sm hover:scale-105 hover:bg-white dark:hover:bg-slate-800 active:scale-95 transition-all duration-300 group" aria-label="切换主题">
        <svg class="w-[20px] h-[20px] stroke-slate-700 dark:stroke-slate-300 transition-all duration-300 rotate-0 scale-100 dark:-rotate-180 dark:scale-0 absolute" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="w-[20px] h-[20px] stroke-slate-700 dark:stroke-slate-300 transition-all duration-300 rotate-180 scale-0 dark:rotate-0 dark:scale-100 absolute" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div id="toast-container" class="fixed top-6 right-6 sm:top-20 sm:right-6 z-[1000] flex flex-col gap-3 max-w-[calc(100vw-3rem)]"></div>

    <div class="relative z-10 w-full max-w-[500px] bg-white/90 dark:bg-slate-800/80 backdrop-blur-2xl border border-white/40 dark:border-white/10 p-7 sm:p-10 rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] dark:shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] transition-all duration-500 my-auto">
        <h1 class="text-2xl sm:text-[1.75rem] font-bold bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent text-center mb-8 break-keep tracking-wide">订阅转换</h1>

        <div class="mb-6">
            <label for="sub-url" class="block mb-2.5 font-medium text-sm text-slate-700 dark:text-slate-300">原始订阅链接</label>
            <input type="url" id="sub-url" placeholder="请在此处粘贴原始订阅链接" required
                class="w-full h-[50px] px-4 bg-white/80 dark:bg-slate-900/50 border border-slate-200 dark:border-white/10 rounded-xl text-slate-900 dark:text-slate-100 text-[15px] placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 transition-all">
            
            <div id="url-info" class="hidden mt-3 px-4 py-3 bg-amber-500/10 border border-amber-500/20 rounded-lg text-[13px] text-amber-600 dark:text-amber-400 items-center gap-2 transition-all">
                <span class="text-base leading-none">⚡</span> 检测到短链接,将自动解析重定向后的链接
            </div>
        </div>

        <div class="mb-8 group" id="custom-select-wrapper">
            <label class="block mb-2.5 font-medium text-sm text-slate-700 dark:text-slate-300">目标客户端</label>
            <div class="relative" id="custom-select-container">
                <div class="select-trigger flex items-center justify-between w-full h-[50px] px-4 bg-white/80 dark:bg-slate-900/50 border border-slate-200 dark:border-white/10 rounded-xl text-[15px] cursor-pointer select-none transition-all group-[.disabled]:opacity-50 group-[.disabled]:cursor-not-allowed group-[.is-open]:border-indigo-400 dark:group-[.is-open]:border-indigo-500 group-[.is-open]:ring-4 group-[.is-open]:ring-indigo-500/10 dark:group-[.is-open]:ring-indigo-500/20" tabindex="0">
                    <span id="selected-option-text">Clash (Meta)</span>
                    <div class="w-[9px] h-[9px] border-l-[2px] border-b-[2px] border-slate-400 dark:border-slate-500 -rotate-45 transition-transform duration-300 transform group-[.is-open]:translate-y-[2px] group-[.is-open]:rotate-[135deg]"></div>
                </div>
                
                <div class="absolute top-[calc(100%+8px)] left-0 right-0 z-20 bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl border border-slate-100 dark:border-white/10 rounded-xl p-1.5 shadow-xl opacity-0 invisible -translate-y-2 group-[.is-open]:opacity-100 group-[.is-open]:visible group-[.is-open]:translate-y-0 transition-all duration-200">
                    <div class="custom-option flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer text-[14px] text-slate-600 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors selected text-primary dark:text-indigo-400 font-semibold" data-value="c">
                        <span>Clash (Meta)</span>
                        <svg class="checkmark w-[18px] h-[18px] stroke-current opacity-100 scale-100 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="custom-option flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer text-[14px] text-slate-600 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" data-value="x">
                        <span>Sing-Box</span>
                        <svg class="checkmark w-[18px] h-[18px] stroke-current opacity-0 scale-75 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="custom-option flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer text-[14px] text-slate-600 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" data-value="g">
                        <span>Surge</span>
                        <svg class="checkmark w-[18px] h-[18px] stroke-current opacity-0 scale-75 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="custom-option flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer text-[14px] text-slate-600 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" data-value="s">
                        <span>Shadowrocket</span>
                        <svg class="checkmark w-[18px] h-[18px] stroke-current opacity-0 scale-75 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="custom-option flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer text-[14px] text-slate-600 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" data-value="l">
                        <span>Loon</span>
                        <svg class="checkmark w-[18px] h-[18px] stroke-current opacity-0 scale-75 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                </div>
            </div>
            <input type="hidden" id="client-select-value" value="c">
        </div>

        <button id="convert-btn" disabled class="group relative overflow-hidden w-full h-[52px] bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-medium rounded-xl flex items-center justify-center gap-2 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed hover:not(:disabled):-translate-y-0.5 hover:not(:disabled):shadow-[0_10px_20px_-10px_rgba(99,102,241,0.6)] active:not(:disabled):translate-y-0 text-[15px]">
            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:not(:disabled):translate-x-full transition-transform duration-700 ease-in-out"></div>
            <div id="btn-loader" class="hidden w-[18px] h-[18px] border-[2px] border-white/30 border-t-white rounded-full animate-spin"></div>
            <span id="btn-text" class="tracking-wide">生成订阅链接</span>
        </button>

        <div id="result-wrapper" class="hidden mt-8 animate-slide-up">
            <label class="block mb-2.5 font-medium text-sm text-slate-700 dark:text-slate-300">生成结果</label>
            <div id="result" class="relative flex items-center gap-3 w-full min-h-[50px] bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-white/10 p-3.5 pr-14 rounded-xl cursor-pointer hover:border-indigo-400 dark:hover:border-indigo-500 transition-colors break-all group/result">
                <code id="generated-url" class="font-mono text-[13px] text-slate-600 dark:text-slate-300 leading-relaxed flex-1"></code>
                <button id="copy-btn-inside" class="absolute right-2 top-1/2 -translate-y-1/2 w-[34px] h-[34px] bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-white/10 hover:border-indigo-400 dark:hover:border-indigo-500 text-slate-600 dark:text-slate-300 rounded-lg flex items-center justify-center transition-all hover:text-indigo-500 z-10 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素获取
        const subUrlInput = document.getElementById('sub-url');
        const convertBtn = document.getElementById('convert-btn');
        const btnLoader = document.getElementById('btn-loader');
        const btnText = document.getElementById('btn-text');
        const resultWrapper = document.getElementById('result-wrapper');
        const generatedUrlElem = document.getElementById('generated-url');
        const resultBox = document.getElementById('result');
        const copyBtnInside = document.getElementById('copy-btn-inside');
        const urlInfoDiv = document.getElementById('url-info');
        const themeToggle = document.getElementById('theme-toggle');
        const themeColorMeta = document.getElementById('theme-color-meta');

        // 下拉框元素获取
        const customSelectWrapper = document.getElementById('custom-select-wrapper');
        const selectTrigger = customSelectWrapper.querySelector('.select-trigger');
        const options = customSelectWrapper.querySelectorAll('.custom-option');
        const selectedOptionText = document.getElementById('selected-option-text');
        const clientSelectValueInput = document.getElementById('client-select-value');

        // 初始化禁用下拉框
        customSelectWrapper.classList.add('disabled');

        // 下拉框逻辑
        selectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!customSelectWrapper.classList.contains('disabled')) {
                customSelectWrapper.classList.toggle('is-open');
            }
        });

        options.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                if (option.classList.contains('selected')) {
                    customSelectWrapper.classList.remove('is-open');
                    return;
                }
                
                // 重置所有选项样式
                options.forEach(o => {
                    o.classList.remove('selected', 'text-primary', 'dark:text-indigo-400', 'font-semibold');
                    const icon = o.querySelector('.checkmark');
                    icon.classList.replace('opacity-100', 'opacity-0');
                    icon.classList.replace('scale-100', 'scale-75');
                });

                // 设置当前项样式
                option.classList.add('selected', 'text-primary', 'dark:text-indigo-400', 'font-semibold');
                const activeIcon = option.querySelector('.checkmark');
                activeIcon.classList.replace('opacity-0', 'opacity-100');
                activeIcon.classList.replace('scale-75', 'scale-100');

                // 更新值
                selectedOptionText.textContent = option.querySelector('span').textContent;
                clientSelectValueInput.value = option.dataset.value;
                customSelectWrapper.classList.remove('is-open');
            });
        });

        window.addEventListener('click', () => customSelectWrapper.classList.remove('is-open'));

        // 短链接域名
        const shortLinkDomains = [
            'suo.yt', 't.cn', 'bit.ly', 'tinyurl.com', 'short.link',
            'dwz.cn', 'u.nu', 'gg.gg', 'is.gd', 'v.gd',
            'cutt.ly', 'rebrand.ly', 't.co', 'goo.gl', 'v1.mk',
            'd1.mk', 'dlj.tf', 'sub.cm'
        ];

        // 主题逻辑与 Meta 标签同步 (解决 Safari 顶部栏颜色)
        function updateThemeMeta(isDark) {
            // 浅色模式背景 slate-50 (#f8fafc), 深色模式背景 slate-900 (#0f172a)
            themeColorMeta.setAttribute('content', isDark ? '#0f172a' : '#f8fafc');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeMeta(isDark);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateThemeMeta(false);
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateThemeMeta(true);
            }
        });
        initTheme();

        // 提示框逻辑
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (type === 'warning') {
                container.querySelectorAll('.is-warning').forEach(t => t.remove());
            }

            const toast = document.createElement('div');
            let classes = 'flex items-center gap-3 px-4 py-3 rounded-xl text-white shadow-lg backdrop-blur-md animate-toast text-[13px] sm:text-[14px] font-medium whitespace-pre-wrap ';
            let icon = '';

            if (type === 'error') {
                classes += 'bg-red-500/90';
                icon = '✕';
            } else if (type === 'warning') {
                classes += 'bg-amber-500/90 is-warning';
                icon = '⚠';
            } else {
                classes += 'bg-emerald-500/90';
                icon = '✓';
            }

            toast.className = classes;
            toast.innerHTML = `<span class="text-base font-bold leading-none">${icon}</span><span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2900);
        }

        // 链接验证与短链接识别
        function isValidUrl(string) {
            if (!string || !string.trim().toLowerCase().startsWith('http')) return false;
            try { new URL(string); return true; } catch (_) { return false; }
        }

        function isShortLink(url) {
            try {
                const hostname = new URL(url).hostname.toLowerCase();
                return shortLinkDomains.some(domain => hostname === domain || hostname.endsWith('.' + domain));
            } catch (_) { return false; }
        }

        // 输入事件处理
        subUrlInput.addEventListener('input', () => {
            const url = subUrlInput.value.trim();
            const canBeValid = isValidUrl(url);
            
            convertBtn.disabled = !canBeValid;
            canBeValid ? customSelectWrapper.classList.remove('disabled') : customSelectWrapper.classList.add('disabled');
            
            resultWrapper.classList.add('hidden');

            if (canBeValid && isShortLink(url)) {
                urlInfoDiv.classList.replace('hidden', 'flex');
            } else {
                urlInfoDiv.classList.replace('flex', 'hidden');
            }
        });

        // 提交按钮事件
        convertBtn.addEventListener('click', async () => {
            const subUrl = subUrlInput.value.trim();
            if (!isValidUrl(subUrl)) {
                showToast('请检查订阅链接是否有效', 'error');
                return;
            }

            showToast('正在生成订阅链接...', 'warning');
            btnLoader.classList.remove('hidden');
            btnText.classList.add('hidden');
            convertBtn.disabled = true;
            customSelectWrapper.classList.add('disabled');
            resultWrapper.classList.add('hidden');

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: subUrl,
                        client: clientSelectValueInput.value,
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    generatedUrlElem.textContent = result.shortUrl;
                    resultWrapper.classList.remove('hidden');

                    navigator.clipboard.writeText(result.shortUrl)
                        .then(() => showToast(`解析成功 (${result.nodeCount || 0}节点)，已复制`))
                        .catch(() => showToast('自动复制失败,请手动复制', 'error'));
                } else {
                    showToast(result.message || '生成失败，未知错误', 'error');
                }
            } catch (error) {
                // 仅作演示时也可展示假数据
                showToast('请求失败,请检查网络或联系管理员', 'error');
            } finally {
                btnLoader.classList.add('hidden');
                btnText.classList.remove('hidden');
                if (isValidUrl(subUrlInput.value.trim())) {
                    convertBtn.disabled = false;
                    customSelectWrapper.classList.remove('disabled');
                }
            }
        });

        // 复制按钮逻辑
        const copyHandler = (e) => {
            e.stopPropagation();
            const urlToCopy = generatedUrlElem.textContent;
            if (urlToCopy) {
                navigator.clipboard.writeText(urlToCopy)
                    .then(() => showToast('链接已复制'))
                    .catch(() => showToast('复制失败', 'error'));
            }
        };
        resultBox.addEventListener('click', copyHandler);
        copyBtnInside.addEventListener('click', copyHandler);

    </script>
</body>
</html>
